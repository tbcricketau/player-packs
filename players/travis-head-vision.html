const keys = Object.keys(PLAYLISTS).filter(k => (PLAYLISTS[k].items||[]).length);
let curKey = keys[0] || null, curIdx = 0, curAngle = 0;

function renderTabs() {
  const t = document.getElementById('tabs'); t.innerHTML = '';
  keys.forEach(k => {
    const pl = PLAYLISTS[k];
    const el = document.createElement('div');
    el.className = 'tab' + (k===curKey?' active':'');
    el.innerHTML = (pl.title||k) + '<span class="n">' + (pl.items.length) + '</span>';
    el.onclick = () => { curKey = k; renderTabs(); renderGrid(); };
    t.appendChild(el);
  });
}
function renderGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  const pl = PLAYLISTS[curKey];
  if (!pl || !pl.items.length) { g.innerHTML = '<div class="empty">No clips.</div>'; return; }
  pl.items.forEach((it, i) => {
    const c = document.createElement('div'); c.className = 'card'; c.onclick = () => openModal(curKey, i);
    c.innerHTML = '<div class="idx">'+(i+1)+' / '+pl.items.length+'</div>' +
                  '<div class="cap">'+(it.caption||('Ball '+(i+1)))+'</div>' +
                  '<div class="play">▶ play</div>';
    g.appendChild(c);
  });
}
function openModal(k, i) { curKey = k; curIdx = i; curAngle = 0; document.getElementById('modal').classList.add('open'); load(); }
function closeModal() { const v=document.getElementById('vid'); v.pause(); v.removeAttribute('src'); v.load();
  document.getElementById('modal').classList.remove('open'); }
function step(d) { const n = PLAYLISTS[curKey].items.length; curIdx = Math.min(n-1, Math.max(0, curIdx+d)); curAngle=0; load(); }
function load() {
  const pl = PLAYLISTS[curKey], it = pl.items[curIdx], n = pl.items.length;
  const angles = (it.angles && it.angles.length) ? it.angles : [{label:'Broadcast', url: it.url}];
  const v = document.getElementById('vid');
  v.src = angles[Math.min(curAngle, angles.length-1)].url || '';
  document.getElementById('mcap').textContent = it.caption || '';
  document.getElementById('mmeta').textContent = (pl.title||curKey);
  document.getElementById('counter').textContent = (curIdx+1) + ' / ' + n;
  document.getElementById('prev').disabled = curIdx===0;
  document.getElementById('next').disabled = curIdx===n-1;
  const ab = document.getElementById('angles'); ab.innerHTML = '';
  if (angles.length > 1) angles.forEach((a, ai) => {
    const b = document.createElement('button'); b.className = 'angle'+(ai===curAngle?' active':''); b.textContent = a.label;
    b.onclick = () => { curAngle = ai; load(); }; ab.appendChild(b);
  });
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('modal').classList.contains('open')) return;
  if (e.key==='Escape') closeModal(); else if (e.key==='ArrowLeft') step(-1); else if (e.key==='ArrowRight') step(1);
});
renderTabs(); renderGrid();
// deep-link: #<playlist_key> opens that playlist's first clip
(function(){ const h=(location.hash||'').replace('#','');
  if (h && PLAYLISTS[h] && PLAYLISTS[h].items.length) openModal(h, 0);
  else if (h && keys.includes(h)) { curKey=h; renderTabs(); renderGrid(); } })();
</script>
